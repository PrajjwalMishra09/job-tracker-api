<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Job Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">
            Job Tracker
        </h1>

        <div class="row mb-4">

            <div class="col">
                <div class="card text-center bg-primary text-white">
                    <div class="card-body">
                        <h5>Total Jobs</h5>
                        <h3 th:text="${totalJobs}"></h3>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card text-center bg-secondary text-white">
                    <div class="card-body">
                        <h5>Applied</h5>
                        <h3 th:text="${appliedCount}"></h3>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card text-center bg-warning">
                    <div class="card-body">
                        <h5>Interview</h5>
                        <h3 th:text="${interviewCount}"></h3>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card text-center bg-success text-white">
                    <div class="card-body">
                        <h5>Offer</h5>
                        <h3 th:text="${offerCount}"></h3>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card text-center bg-danger text-white">
                    <div class="card-body">
                        <h5>Rejected</h5>
                        <h3 th:text="${rejectedCount}"></h3>
                    </div>
                </div>
            </div>

        </div>

        <form action="/search" method="get" class="mb-4">

            <div class="input-group">

                <input type="text"
                       name="company"
                       class="form-control"
                       placeholder="Search company">

                <button class="btn btn-dark">
                    Search
                </button>

                <a href="/" class="btn btn-secondary">
                    Show All
                </a>

            </div>

        </form>

        <form action="/add-job" method="post">

            <div class="mb-3">

                <label class="form-label">
                    Company Name
                </label>

                <input type="text"
                       name="companyName"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Role
                </label>

                <input type="text"
                       name="role"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>

                <select name="status"
                        class="form-select">

                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>

                </select>

            </div>

            <button class="btn btn-primary">
                Add Job
            </button>

        </form>

    </div>

    <div class="card shadow mt-4 p-4">

        <h2>
            All Applications
        </h2>

        <table class="table table-striped">

            <thead>

            <tr>

                <th>ID</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
                <th>Delete</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="job : ${jobs}">

                <td th:text="${job.id}"></td>

                <td th:text="${job.companyName}"></td>

                <td th:text="${job.role}"></td>

                <td>

                    <form th:action="@{/update-status/{id}(id=${job.id})}"
                          method="post"
                          class="d-flex gap-2">

                        <select name="status"
                                class="form-select">

                            <option value="Applied">Applied</option>
                            <option value="Interview">Interview</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>

                        </select>

                        <button class="btn btn-success btn-sm">
                            Save
                        </button>

                    </form>

                </td>

                <td>

                    <form th:action="@{/delete-job/{id}(id=${job.id})}"
                          method="post">

                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
